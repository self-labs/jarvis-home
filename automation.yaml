alias: Jarvis Alexa Webhook
description: Recebe comandos da Alexa, processa via IA local e responde assíncrono
mode: single
triggers:
  - trigger: webhook
    webhook_id: jarvis_skill
    allowed_methods:
      - POST
    local_only: false
actions:
  - choose:
      # --- Inicialização da Skill ---
      - conditions:
          - condition: or
            conditions:
              - condition: template
                value_template: "{{ trigger.json.request.type == 'LaunchRequest' }}"
              - condition: template
                value_template: "{{ trigger.json.request.intent.name == 'IniciarConversa' }}"
        sequence:
          - action: input_text.set_value
            target:
              entity_id: input_text.jarvis_response
            data:
              value: Jarvis ativado. O que deseja?

      # --- Processamento do LLM ---
      - conditions:
          - condition: template
            value_template: "{{ trigger.json.request.intent.name == 'ConversationIntent' }}"
        sequence:
          - action: input_text.set_value
            target:
              entity_id: input_text.jarvis_response
            data:
              value: Processando...

          - action: conversation.process
            data:
              agent_id: conversation.extended_openai_conversation # COLOQUE SEU AGENT_ID AQUI
              text: "{{ trigger.json.request.intent.slots.text.value }}"
            response_variable: jarvis_response

          - action: input_text.set_value
            target:
              entity_id: input_text.jarvis_response
            data:
              value: "{{ jarvis_response.response.speech.plain.speech }}"

          # Retorno de voz assíncrono pela Alexa
          - action: notify.alexa_media_echo_dot_de_gustavo # COLOQUE O NOME DO SEU MEDIA PLAYER AQUI
            data:
              message: "{{ jarvis_response.response.speech.plain.speech }}"
              data:
                type: tts

      # --- Encerramento ---
      - conditions:
          - condition: template
            value_template: >-
              {{ trigger.json.request.intent.name in ['AMAZON.StopIntent', 'AMAZON.CancelIntent', 'AMAZON.NoIntent'] }}
        sequence:
          - action: input_text.set_value
            target:
              entity_id: input_text.jarvis_response
            data:
              value: Até logo.

    # --- Default ---
    default:
      - action: input_text.set_value
        target:
          entity_id: input_text.jarvis_response
        data:
          value: >-
            Desculpe, não entendi o comando {{ trigger.json.request.intent.name }}
